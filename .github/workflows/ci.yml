name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']

    services:
      couchdb:
        image: couchdb:3
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
        ports:
          - 5984:5984

    env:
      COUCHDB_ADMIN_PASSWORD: password
      COUCHDB_URL: http://admin:password@127.0.0.1:5984

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Wait for CouchDB and create system databases
        run: |
          for i in $(seq 1 30); do
            curl -sf http://admin:password@127.0.0.1:5984/_up && break
            echo "waiting for CouchDB ($i)..."; sleep 2
          done
          curl -sX PUT http://admin:password@127.0.0.1:5984/_users || true
          curl -sX PUT http://admin:password@127.0.0.1:5984/_replicator || true

      - name: Run specs
        run: bundle exec rspec spec
